<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الصفحة غير موجودة – اتحاد شباب الوطن</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
    .c{max-width:500px}
    .n{font-size:8rem;font-weight:900;background:linear-gradient(135deg,#3b82f6,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
    h1{font-size:1.5rem;margin:1rem 0 .5rem}
    p{color:#94a3b8;margin-bottom:2rem;font-size:1rem}
    a{display:inline-flex;align-items:center;gap:.5rem;background:#3b82f6;color:#fff;padding:.75rem 1.75rem;border-radius:999px;text-decoration:none;font-weight:700;font-size:.95rem;transition:all .3s}
    a:hover{background:#2563eb;transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="c">
    <div class="n">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
    <a href="/"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
  </div>
</body>
</html>
